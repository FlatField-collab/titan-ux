name: Export screen screenshots

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # adds a "Run workflow" button in the Actions tab for manual re-runs

jobs:
  export-screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install playwright@latest @supabase/supabase-js@latest
          npx playwright install --with-deps chromium

      - name: Capture and upload screenshots
        env:
          BASE_URL: https://flatfield-collab.github.io/titan-ux
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/export-screenshots.mjs
